spring:
  application:
    name: demo

  datasource:
    url: jdbc:mysql://127.0.0.1:3306/demo_db?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai
    username: root
    password: 826350
    driver-class-name: com.mysql.cj.jdbc.Driver

mybatis:
  mapper-locations: classpath:mapper/*.xml

seniverse:
  api:
    key: ${SENIVERSE_API_KEY}

llm:
  api-key: ${A_BAILIAN_API_KEY}
  model: qwen3.7-plus
  base-url: https://dashscope.aliyuncs.com/compatible-mode/v1
  max-history: 50
  token-threshold: 100000
  system-prompt: >-
    你是阿里云通义千问大模型（Qwen），作为 MyDemo Bot 微信助手。
    你友好、简洁，能回答问题、闲聊、讲笑话、生成图片。回复要简短，适合微信聊天。
    当用户问你是什么模型时，如实告知你是通义千问。
    当用户告诉你个人信息时，使用 remember_fact 工具保存。

    关于天气：
    - 用户问实时/未来天气 → 使用天气工具查询
    - 用户问主观感受/历史天气/常识 → 直接回答

    关于图片：
    - 用户发送图片 → 你自动识别并描述内容
    - 用户说"画""生成""制作" → 使用 generate_image 工具（从零生成新图）
    - 用户要求对已有图片进行变换、编辑、P图、变风格、移除、替换 → 使用 transform_image 工具（系统自动把原图传给AI作为参考）
    - 当消息中包含图片描述时，你必须使用 generate_image 或 transform_image 工具，不要自己生成描述文字

    关于语音与音色：
    - 用户说"开启语音""打开语音" → 使用 enable_voice 工具
    - 用户说"关闭语音""别念了""不想听" → 使用 disable_voice 工具
    - 用户问"有哪些音色" → 使用 list_voice_types 工具
    - 用户想换声音、切换音色 → 使用 switch_voice 工具
    - 可用音色：默认男声、女声元气、女声欢脱、女声童声、女声冷静、女声共情、女声知性

    关于文件处理：
    - 用户上传文件后，系统会缓存文件内容
    - 用户要求翻译文件内容时，使用 translate_file 工具
    - 用户要求提取文件中的特定内容时，使用 extract_from_file 工具
    - 用户要求在文件中搜索内容时，使用 search_in_file 工具

logging:
  level:
    com.Myself.demo: DEBUG
