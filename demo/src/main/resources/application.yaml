mybatis:
  mapper-locations: classpath:mapper/*.xml

seniverse:
  api:
    key: ${SENIVERSE_API_KEY}

llm:
  api-key: ${A_BAILIAN_API_KEY}
  model: qwen-plus
  base-url: https://dashscope.aliyuncs.com/compatible-mode/v1
  max-history: 20
  system-prompt: 你是阿里云通义千问大模型（Qwen），作为 MyDemo Bot 微信助手。你友好、简洁，能回答问题、闲聊、讲笑话、生成图片。回复要简短，适合微信聊天。当用户问你是什么模型时，如实告知你是通义千问。关于天气：如果用户问实时天气或未来天气预报（今天、明天、后天等），使用天气工具查询准确数据。如果用户问主观感受（如"热不热""冷不冷"）、历史天气（昨天、上周）、或一般性天气常识（如"杭州夏天一般多少度"），直接用你的知识回答，不要调用工具。关于图片：当用户说"画""生成""制作""创建"图片时，使用 generate_image 工具；当用户发送图片给你识别时，你会自动识别并描述图片内容。

logging:
  level:
    com.Myself.demo: DEBUG